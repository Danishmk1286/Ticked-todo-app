<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticked ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F2EFE9;
    --surface: #FAFAF7;
    --border: #E0DDD6;
    --text: #1C1C1A;
    --text-muted: #8A8880;
    --accent: #2D6A5A;
    --accent-light: #EAF2EF;
    --accent-mid: #3D8A74;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --complete-text: #A8A5A0;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 2px 8px rgba(0,0,0,0.09), 0 8px 24px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 16px 120px;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding-top: 52px;
  }

  /* ── GITHUB BADGE ── */
  .github-badge {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 90;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--text);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 13px 7px 10px;
    border-radius: 20px;
    text-decoration: none;
    letter-spacing: 0.2px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    transition: background 0.2s, transform 0.15s;
  }
  .github-badge:hover { background: #2D2D2B; transform: translateY(-1px); }
  .github-badge svg { flex-shrink: 0; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 8vw, 72px);
    line-height: 1;
    letter-spacing: -1px;
    color: var(--text);
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    padding-bottom: 6px;
  }

  .counter {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

  .divider { height: 1px; background: var(--border); margin: 20px 0 28px; }

  /* ── INPUT ── */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .task-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .task-input::placeholder { color: #C0BDB8; }
  .task-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,90,0.1); }

  .btn-add {
    width: 50px; height: 50px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .btn-add:hover { background: var(--accent-mid); transform: scale(1.05); }
  .btn-add:active { transform: scale(0.96); }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom: 28px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-msg {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    font-style: italic;
    font-family: 'DM Serif Display', serif;
    transition: opacity 0.4s;
  }

  .progress-pct {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .progress-track {
    height: 7px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #5BA08A 0%, #2D6A5A 60%, #1F5247 100%);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .progress-fill.complete {
    background: linear-gradient(90deg, #5BA08A, #2D6A5A, #F4A261);
    animation: shimmer 1.5s ease 0.1s;
  }

  @keyframes shimmer {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1.3); }
    100% { filter: brightness(1); }
  }

  /* ── TASK LIST ── */
  #task-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, opacity 0.3s, transform 0.3s, border-color 0.2s;
    overflow: hidden;
    position: relative;
  }

  .task-card:hover { box-shadow: var(--shadow-hover); }
  .task-card.dragging { opacity: 0.45; transform: scale(0.98); border-color: var(--accent); }
  .task-card.drag-over { border-color: var(--accent); border-style: dashed; }
  .task-card.completing { animation: completePop 0.35s ease; }
  .task-card.removing { animation: slideOut 0.28s ease forwards; }
  .task-card.entering { animation: slideIn 0.32s cubic-bezier(0.34,1.56,0.64,1); }

  @keyframes completePop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-14px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0) scaleY(1); max-height: 300px; }
    to   { opacity: 0; transform: translateX(12px) scaleY(0.8); max-height: 0; padding: 0; margin: 0; }
  }

  .task-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px 0 16px;
  }

  /* drag handle */
  .drag-handle {
    color: var(--border);
    font-size: 16px;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
    line-height: 1;
  }
  .task-card:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  /* checkbox */
  .task-check {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .task-check:hover { border-color: var(--accent); background: var(--accent-light); }
  .task-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check.checked::after {
    content: '';
    display: block;
    width: 5px; height: 9px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  /* title */
  .task-title {
    flex: 1;
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    cursor: default;
    position: relative;
    display: inline-block;
    line-height: 1.35;
    transition: color 0.3s;
    word-break: break-word;
  }

  .task-title::after {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    height: 1.5px;
    background: var(--complete-text);
    width: 0;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    transform: translateY(-50%);
  }
  .task-card.done .task-title { color: var(--complete-text); }
  .task-card.done .task-title::after { width: 100%; }

  /* ── EMPTY STATE ── */
  .note-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .note-dot.visible { opacity: 1; }

  /* delete btn */
  .btn-delete {
    width: 28px; height: 28px;
    border: none;
    background: none;
    color: #D0CDC8;
    font-size: 17px;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    opacity: 0;
    line-height: 1;
  }
  .task-card:hover .btn-delete,
  .btn-delete:focus { opacity: 1; }
  .btn-delete:hover { color: var(--danger); background: var(--danger-light); }

  /* toggle chevron */
  .btn-toggle {
    width: 28px; height: 28px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 13px;
  }
  .btn-toggle:hover { background: var(--accent-light); color: var(--accent); }
  .btn-toggle svg { transition: transform 0.25s; }
  .btn-toggle.open svg { transform: rotate(180deg); }

  /* meta row */
  .task-meta {
    padding: 6px 14px 12px 58px;
    font-size: 11.5px;
    color: var(--text-muted);
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* notes panel */
  .task-notes {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .task-notes.open { max-height: 200px; }

  .notes-inner {
    padding: 12px 14px 14px 58px;
    border-top: 1px solid var(--border);
  }

  .notes-textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 72px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .notes-textarea::placeholder { color: #C8C5C0; }
  .notes-textarea:focus { border-color: var(--accent); }

  /* note indicator dot */
  .note-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .note-dot.visible { opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 52px 20px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon { font-size: 42px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text-muted);
    font-style: italic;
  }
  .empty-state span {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #B8B5B0;
    display: block;
    margin-top: 6px;
  }

  /* ── SCRATCH PAD ── */
  .scratchpad-section {
    margin-top: 40px;
  }

  .scratchpad-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }

  .scratchpad-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
  }

  .scratchpad-label .sp-icon {
    font-size: 14px;
    opacity: 0.6;
  }

  .scratchpad-toggle {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.25s;
    display: flex; align-items: center;
  }
  .scratchpad-toggle svg { transition: transform 0.25s; }
  .scratchpad-toggle.open svg { transform: rotate(180deg); }

  .scratchpad-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .scratchpad-body.open { max-height: 420px; }

  .scratchpad-pad {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 140px;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.65;
    box-shadow: var(--shadow);
  }
  .scratchpad-pad::placeholder { color: #C8C5C0; font-style: italic; }
  .scratchpad-pad:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,90,0.08); }

  .scratchpad-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }

  .sp-hint {
    font-size: 11px;
    color: #C0BDB8;
    font-style: italic;
  }

  .sp-char-count {
    font-size: 11px;
    color: #C8C5C0;
    transition: color 0.2s;
  }
  .sp-char-count.warning { color: #C98A1A; }
  .sp-char-count.danger  { color: #D94F3D; }

  .sp-saved {
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.4s;
    font-weight: 500;
  }
  .sp-saved.show { opacity: 1; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,26,0.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    transform: translateY(10px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
  }
  .modal-overlay.active .modal { transform: translateY(0) scale(1); }

  .modal-icon { font-size: 32px; margin-bottom: 14px; }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .modal p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 24px;
  }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  .btn-cancel {
    flex: 1;
    padding: 11px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { background: var(--bg); border-color: #C8C5C0; color: var(--text); }

  .btn-confirm-danger {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 10px;
    background: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-confirm-danger:hover { background: #a93226; }

  /* ── CONFETTI ── */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
    top: -20px;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .header h1 { font-size: 42px; }
    .drag-handle { opacity: 0.4; }
    .btn-delete { opacity: 1; }
    .task-title { font-size: 16px; }
    .task-meta { padding-left: 50px; }
    .notes-inner { padding-left: 50px; }
  }
</style>
</head>
<body>

<!-- GitHub Badge -->
<a class="github-badge" href="https://github.com/Danishmk1286/Ticked-todo-app" target="_blank" rel="noopener" aria-label="View on GitHub">

  </svg>
  GitHub
</a>

<div class="page">

  <!-- Header -->
  <div class="header">
    <h1>Ticked <span style="font-size:0.45em;opacity:0.4;vertical-align:middle">✦</span></h1>
    <div class="header-right">
      <span class="counter" id="counter">0 of 0 done</span>
      <button class="btn-reset" id="btn-reset" aria-label="Reset all tasks">Reset all</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Input -->
  <div class="input-row">
    <input class="task-input" id="task-input" type="text" placeholder="Add a new task..." aria-label="New task title" maxlength="120">
    <button class="btn-add" id="btn-add" aria-label="Add task">+</button>
  </div>

  <!-- Progress Bar -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span class="progress-msg" id="progress-msg">Let's get started 🚀</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Task List -->
  <div id="task-list" aria-label="Task list"></div>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" aria-live="polite">
    <div class="empty-icon">✦</div>
    <p>Nothing here yet</p>
    <span>Add your first task above and start making progress</span>
  </div>

  <!-- Scratch Pad -->
  <div class="scratchpad-section">
    <div class="scratchpad-header" id="sp-header" role="button" tabindex="0" aria-expanded="true" aria-controls="sp-body">
      <div class="scratchpad-label">
        <span class="sp-icon">✎</span>
        Scratch pad
      </div>
      <div class="scratchpad-toggle open" id="sp-toggle">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="scratchpad-body open" id="sp-body">
      <textarea
        class="scratchpad-pad"
        id="sp-textarea"
        placeholder="Dump your thoughts here — ideas, half-formed tasks, anything that's not quite a task yet…"
        maxlength="2000"
        aria-label="Scratch pad"
      ></textarea>
      <div class="scratchpad-footer">
        <span class="sp-hint">Saved automatically</span>
        <div style="display:flex;gap:12px;align-items:center">
          <span class="sp-saved" id="sp-saved">✓ Saved</span>
          <span class="sp-char-count" id="sp-char-count">0 / 2000</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Confetti -->
<div class="confetti-wrap" id="confetti-wrap"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">⚠️</div>
    <h2 id="modal-title">Are you sure?</h2>
    <p id="modal-body">This will permanently delete all your tasks and cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm-danger" id="modal-confirm">Yes, delete</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────
const STORAGE_KEY = 'ticked_tasks_v4';
const SP_KEY      = 'ticked_scratchpad';

// ── STATE ──────────────────────────────────────────
let tasks        = [];
let dragSrcId    = null;
let pendingAction = null;
let lastPct      = -1;

// ── PERSISTENCE ────────────────────────────────────
const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
const load = () => {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tasks = []; }
};

// ── PROGRESS ────────────────────────────────────────
const MESSAGES = [
  [100, "All done! You crushed it today 🎉"],
  [75,  "Almost there, don't stop now!"],
  [50,  "Halfway! You're on a roll 🔥"],
  [25,  "Quarter way there, nice work! 💪"],
  [1,   "You've made a start, keep going!"],
  [0,   "Let's get started 🚀"],
];

function updateProgress() {
  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

  document.getElementById('counter').textContent = `${done} of ${total} done`;

  const fill  = document.getElementById('progress-fill');
  const track = document.getElementById('progress-track');
  fill.style.width = pct + '%';
  track.setAttribute('aria-valuenow', pct);
  document.getElementById('progress-pct').textContent = pct + '%';
  fill.classList.toggle('complete', pct === 100 && total > 0);

  const [, msg] = MESSAGES.find(([t]) => pct >= t) || MESSAGES[MESSAGES.length - 1];
  document.getElementById('progress-msg').textContent = msg;

  if (pct === 100 && total > 0 && lastPct !== 100) setTimeout(fireConfetti, 400);
  lastPct = pct;
}

// ── CONFETTI ────────────────────────────────────────
function fireConfetti() {
  const wrap   = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#2D6A5A','#5BA08A','#F4A261','#E8C547','#A8D8A8','#D94F3D'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.2+Math.random()*1.6}s;
      animation-delay:${Math.random()*0.6}s;
      width:${6+Math.random()*6}px;
      height:${6+Math.random()*6}px;
    `;
    wrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── TIME AGO ────────────────────────────────────────
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60)  return m === 1 ? '1 min ago' : `${m} mins ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return h === 1 ? '1 hour ago' : `${h} hours ago`;
  const d = Math.floor(h / 24);
  return d === 1 ? 'Yesterday' : `${d} days ago`;
}

// ── SORTING ─────────────────────────────────────────
function sortedTasks() {
  const incomplete = tasks.filter(t => !t.done).sort((a, b) => a.createdAt - b.createdAt);
  const complete   = tasks.filter(t =>  t.done).sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));
  return [...incomplete, ...complete];
}

// ── RENDER ──────────────────────────────────────────
function render(animate = false) {
  const list  = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  const sorted = sortedTasks();

  // remove stale cards
  [...list.querySelectorAll('.task-card')].forEach(card => {
    if (!tasks.find(t => t.id === card.dataset.id)) card.remove();
  });

  // create or update
  sorted.forEach(task => {
    let card = list.querySelector(`.task-card[data-id="${task.id}"]`);
    if (!card) {
      card = createCard(task);
      list.appendChild(card);
      if (animate) card.classList.add('entering');
    } else {
      updateCard(card, task);
    }
  });

  // reorder DOM
  sorted.forEach((task, i) => {
    const card = list.querySelector(`.task-card[data-id="${task.id}"]`);
    if (card && list.children[i] !== card) list.appendChild(card);
  });

  empty.classList.toggle('visible', tasks.length === 0);
  updateProgress();
  save();
}

// ── CREATE CARD ─────────────────────────────────────
function createCard(task) {
  const card = document.createElement('div');
  card.className = `task-card${task.done ? ' done' : ''}`;
  card.dataset.id = task.id;
  card.draggable  = true;

  card.innerHTML = `
    <div class="task-main">
      <span class="drag-handle" aria-hidden="true">⠿</span>
      <div class="task-check${task.done ? ' checked' : ''}"
           role="checkbox" aria-checked="${task.done}"
           tabindex="0" aria-label="Mark complete"></div>
      <span class="task-title">${escHtml(task.title)}</span>
      <span class="note-dot${task.note ? ' visible' : ''}" title="Has a note"></span>
      <button class="btn-delete" aria-label="Delete task">✕</button>
      <button class="btn-toggle${task.open ? ' open' : ''}" aria-label="Toggle notes" aria-expanded="${task.open}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="task-meta">
      <span class="meta-time">${timeAgo(task.createdAt)}</span>
    </div>
    <div class="task-notes${task.open ? ' open' : ''}">
      <div class="notes-inner">
        <textarea class="notes-textarea" placeholder="Add a note…" aria-label="Task note" maxlength="500">${escHtml(task.note || '')}</textarea>
      </div>
    </div>
  `;

  bindCardEvents(card, task.id);
  return card;
}

// ── UPDATE CARD ─────────────────────────────────────
function updateCard(card, task) {
  card.className = `task-card${task.done ? ' done' : ''}`;

  const check = card.querySelector('.task-check');
  check.classList.toggle('checked', task.done);
  check.setAttribute('aria-checked', task.done);

  card.querySelector('.task-title').textContent = task.title;
  card.querySelector('.note-dot').classList.toggle('visible', !!task.note);
  card.querySelector('.meta-time').textContent = timeAgo(task.createdAt);

  const notesPanel = card.querySelector('.task-notes');
  const toggleBtn  = card.querySelector('.btn-toggle');
  notesPanel.classList.toggle('open', task.open);
  toggleBtn.classList.toggle('open', task.open);
  toggleBtn.setAttribute('aria-expanded', task.open);

  const ta = card.querySelector('.notes-textarea');
  if (ta.value !== (task.note || '')) ta.value = task.note || '';
}

// ── BIND CARD EVENTS ────────────────────────────────
function bindCardEvents(card, id) {
  // complete toggle
  const check = card.querySelector('.task-check');
  const toggleDone = () => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    card.classList.add('completing');
    card.addEventListener('animationend', () => card.classList.remove('completing'), { once: true });
    task.done = !task.done;
    task.completedAt = task.done ? Date.now() : null;
    render();
  };
  check.addEventListener('click', toggleDone);
  check.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleDone(); } });

  // delete
  card.querySelector('.btn-delete').addEventListener('click', () => {
    const task = tasks.find(t => t.id === id);
    showModal({
      icon: '🗑️',
      title: 'Delete this task?',
      body: `"${task ? task.title : 'This task'}" will be permanently removed.`,
      confirmLabel: 'Yes, delete',
      onConfirm: () => {
        card.classList.add('removing');
        card.addEventListener('animationend', () => {
          tasks = tasks.filter(t => t.id !== id);
          render();
        }, { once: true });
      }
    });
  });

  // notes toggle
  card.querySelector('.btn-toggle').addEventListener('click', () => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.open = !task.open;
    render();
  });

  // note autosave
  card.querySelector('.notes-textarea').addEventListener('input', e => {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.note = e.target.value;
      card.querySelector('.note-dot').classList.toggle('visible', !!task.note);
      save();
    }
  });

  // drag
  card.addEventListener('dragstart', e => {
    dragSrcId = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragSrcId !== id) card.classList.add('drag-over');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (dragSrcId === id) return;
    const si = tasks.findIndex(t => t.id === dragSrcId);
    const di = tasks.findIndex(t => t.id === id);
    if (si === -1 || di === -1) return;
    const [moved] = tasks.splice(si, 1);
    tasks.splice(di, 0, moved);
    render();
  });
}

// ── ADD TASK ────────────────────────────────────────
function addTask() {
  const input = document.getElementById('task-input');
  const title = input.value.trim();
  if (!title) {
    input.focus();
    input.style.borderColor = 'var(--danger)';
    setTimeout(() => input.style.borderColor = '', 800);
    return;
  }
  tasks.push({
    id: Date.now() + Math.random().toString(36).slice(2),
    title,
    done: false,
    note: '',
    open: false,
    createdAt: Date.now(),
    completedAt: null,
  });
  input.value = '';
  render(true);
  input.focus();
}

// ── MODAL ────────────────────────────────────────────
function showModal({ icon, title, body, confirmLabel, onConfirm }) {
  document.getElementById('modal-icon').textContent    = icon;
  document.getElementById('modal-title').textContent   = title;
  document.getElementById('modal-body').textContent    = body;
  document.getElementById('modal-confirm').textContent = confirmLabel;
  pendingAction = onConfirm;
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('modal-cancel').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  pendingAction = null;
}

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-confirm').addEventListener('click', () => { if (pendingAction) pendingAction(); closeModal(); });
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── RESET ────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!tasks.length) return;
  showModal({
    icon: '⚠️',
    title: 'Reset everything?',
    body: 'All tasks will be permanently deleted. This cannot be undone.',
    confirmLabel: 'Yes, delete all',
    onConfirm: () => { tasks = []; lastPct = -1; render(); }
  });
});

// ── INPUT ─────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// ── SCRATCH PAD ────────────────────────────────────────
const SP_MAX = 2000;
const spHeader   = document.getElementById('sp-header');
const spBody     = document.getElementById('sp-body');
const spToggle   = document.getElementById('sp-toggle');
const spTextarea = document.getElementById('sp-textarea');
const spCount    = document.getElementById('sp-char-count');
const spSaved    = document.getElementById('sp-saved');
let spOpen = true;
let spSaveTimer;

// load scratch pad
spTextarea.value = localStorage.getItem(SP_KEY) || '';
updateSpCount();

function toggleScratchpad() {
  spOpen = !spOpen;
  spBody.classList.toggle('open', spOpen);
  spToggle.classList.toggle('open', spOpen);
  spHeader.setAttribute('aria-expanded', spOpen);
  if (spOpen) setTimeout(() => spTextarea.focus(), 320);
}

spHeader.addEventListener('click', toggleScratchpad);
spHeader.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleScratchpad(); } });

function updateSpCount() {
  const len = spTextarea.value.length;
  spCount.textContent = `${len} / ${SP_MAX}`;
  spCount.className = 'sp-char-count' + (len > 1800 ? ' danger' : len > 1500 ? ' warning' : '');
}

spTextarea.addEventListener('input', () => {
  updateSpCount();
  clearTimeout(spSaveTimer);
  spSaved.classList.remove('show');
  spSaveTimer = setTimeout(() => {
    localStorage.setItem(SP_KEY, spTextarea.value);
    spSaved.classList.add('show');
    setTimeout(() => spSaved.classList.remove('show'), 2000);
  }, 600);
});

// ── UTILS ────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────
load();
render();

setInterval(() => {
  document.querySelectorAll('.task-card').forEach(card => {
    const task = tasks.find(t => t.id === card.dataset.id);
    if (task) {
      const el = card.querySelector('.meta-time');
      if (el) el.textContent = timeAgo(task.createdAt);
    }
  });
}, 30000);
</script>
</body>
</html>
